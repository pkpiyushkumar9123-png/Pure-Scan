<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Green circular background -->
  <circle cx="256" cy="256" r="230" fill="#22C55E"/>
  
  <!-- White plate/bowl bottom -->
  <path d="M 120 300 Q 120 380 256 390 Q 392 380 392 300 L 120 300" fill="white"/>
  
  <!-- Leaves -->
  <g fill="#22C55E">
    <!-- Left leaf -->
    <path d="M 180 200 Q 150 240 160 280 Q 170 260 200 240 Q 190 220 180 200" fill="#16A34A"/>
    <path d="M 180 200 Q 170 240 180 280 Q 200 260 210 220 Q 200 210 180 200" fill="#22C55E"/>
    
    <!-- Center leaf -->
    <path d="M 256 140 Q 240 200 256 260 Q 270 200 270 140 Q 265 140 256 140" fill="#16A34A"/>
    <path d="M 256 140 Q 272 200 256 260 Q 242 200 242 140 Q 248 140 256 140" fill="#22C55E"/>
    
    <!-- Right leaf -->
    <path d="M 332 200 Q 362 240 352 280 Q 342 260 312 240 Q 322 220 332 200" fill="#16A34A"/>
    <path d="M 332 200 Q 342 240 332 280 Q 312 260 302 220 Q 312 210 332 200" fill="#22C55E"/>
  </g>
  
  <!-- Barcode box in top right -->
  <g>
    <!-- Barcode border -->
    <rect x="320" y="60" width="120" height="120" rx="12" fill="white" stroke="#333" stroke-width="8"/>
    
    <!-- Barcode lines -->
    <g stroke="#333" stroke-width="6" stroke-linecap="round">
      <line x1="335" y1="80" x2="335" y2="160"/>
      <line x1="345" y1="80" x2="345" y2="160"/>
      <line x1="360" y1="80" x2="360" y2="160"/>
      <line x1="370" y1="80" x2="370" y2="160"/>
      <line x1="385" y1="80" x2="385" y2="160"/>
      <line x1="395" y1="80" x2="395" y2="160"/>
      <line x1="410" y1="80" x2="410" y2="160"/>
      <line x1="420" y1="80" x2="420" y2="160"/>
    </g>
  </g>
  
  <!-- "FOOD SCANNER" text -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="2">FOOD</text>
  <text x="256" y="385" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="2">SCANNER</text>
</svg>